<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cinema Atlas – Filmmaker Map</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0d10;color:#e8e6df;font:13px/1.4 system-ui,sans-serif;overflow:hidden}
  #stage{position:relative;width:100vw;height:100vh}
  #cv{display:block}
  #stage.drag{cursor:grab}
  #stage.hovering{cursor:crosshair}
  #hud{position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:10px;pointer-events:none}
  #map-title{font:700 13px system-ui;color:#e8b14c;letter-spacing:.14em;text-transform:uppercase}
  #stats{font:11px system-ui;color:#46445a}
  #role-row{display:flex;gap:6px;pointer-events:all}
  .role-btn{
    padding:3px 10px;border-radius:20px;font-size:10px;
    border:1px solid #3a3850;background:transparent;
    cursor:pointer;color:#8a8779;transition:all .15s;letter-spacing:.04em;
  }
  .role-btn.active{background:#1e1c2a;color:#e8e6df;border-color:#5a5870}
  /* zoom controls — right side, vertically centred */
  .controls{
    position:absolute;top:50%;right:20px;transform:translateY(-50%);
    pointer-events:auto;display:flex;flex-direction:column;gap:6px;
  }
  .controls button{
    width:32px;height:32px;background:rgba(20,20,24,.85);
    border:1px solid #2a2a38;color:#e8b14c;border-radius:4px;
    font-size:16px;cursor:pointer;backdrop-filter:blur(8px);
    transition:border-color .15s;
  }
  .controls button:hover{border-color:#e8b14c}
  #tip{
    position:absolute;display:none;
    background:rgba(10,10,14,.95);border:1px solid #2a2a3a;
    border-radius:7px;padding:9px 13px;
    pointer-events:none;font-size:12px;line-height:1.7;
    max-width:240px;
  }
  #movement-panel{
    position:absolute;bottom:20px;left:0;right:0;
    display:flex;gap:5px;padding:0 20px;overflow-x:auto;
    pointer-events:auto;scrollbar-width:none;
  }
  #movement-panel::-webkit-scrollbar{display:none}
  .chip{
    flex-shrink:0;padding:3px 9px;border-radius:20px;
    font-size:10px;border:1px solid;background:transparent;
    cursor:pointer;opacity:.55;transition:opacity .15s;letter-spacing:.03em;
  }
  .chip:hover,.chip.active{opacity:1}
  .chip.faded{opacity:.15}
  #loading{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:#0d0d10;font-size:14px;color:#46445a;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>
  <div id="hud">
    <div id="map-title">Filmmaker Landscape</div>
    <div id="stats">
      <span id="nc-dir">–</span> directors ·
      <span id="nc-dop">–</span> cinematographers ·
      <span id="mc">–</span> movements
    </div>
    <div id="role-row">
      <button class="role-btn active" data-role="Director">● Directors</button>
      <button class="role-btn active" data-role="Cinematographer">○ Cinematographers</button>
    </div>
  </div>
  <div class="controls">
    <button id="zin">+</button>
    <button id="zout">−</button>
    <button id="reset">◉</button>
  </div>
  <div id="movement-panel"></div>
  <div id="tip"></div>
  <div id="loading">Loading filmmaker landscape…</div>
</div>

<script type="module">
let DATA;
try {
  const res = await fetch('/director_graph.json');
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  DATA = await res.json();
  document.getElementById('loading')?.remove();
} catch(err) {
  document.getElementById('loading').textContent = 'Error: ' + err.message;
  throw err;
}

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const stage = document.getElementById('stage');
const tip = document.getElementById('tip');
let W, H, DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize(); window.addEventListener('resize', ()=>{ resize(); fit(); draw(); });

const nodes = DATA.nodes;
const byId  = new Map(nodes.map(n=>[n.person_id, n]));

const PALETTE = [
  '#e8a838','#6b9eba','#d46b8a','#c07848','#6a5a90',
  '#c05050','#5a8a5a','#8a7a4a','#8060a0','#4a90a8',
  '#803060','#3878c0','#607050','#c07840','#5a7888',
];

for(const n of nodes){
  n._c      = PALETTE[n.cluster % PALETTE.length];
  n._group  = n.cluster_label || `Cluster ${n.cluster}`;
  n._isDOP  = n.role === 'Cinematographer';
  n._rscale = Math.max(1, Math.sqrt(n.film_count || 1));
}

// Precompute k=8 nearest neighbours for each node (2D Euclidean)
const K_NBR = 8;
for(const n of nodes){
  const scored = [];
  for(const m of nodes){
    if(m===n) continue;
    scored.push([m, (n.x-m.x)**2+(n.y-m.y)**2]);
  }
  scored.sort((a,b)=>a[1]-b[1]);
  n._nbrs = scored.slice(0, K_NBR).map(([m])=>m);
}

// Role toggle
const roleVisible = { Director: true, Cinematographer: true };
document.querySelectorAll('.role-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const role = btn.dataset.role;
    roleVisible[role] = !roleVisible[role];
    btn.classList.toggle('active', roleVisible[role]);
    hover=null; draw();
  });
});

// Movement chips
let activeGroup = null;
const panel = document.getElementById('movement-panel');
const groupColorMap = new Map(nodes.map(n=>[n._group, n._c]));
[...groupColorMap.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([label,col])=>{
  const c = document.createElement('button');
  c.className='chip'; c.textContent=label;
  c.style.color=col; c.style.borderColor=col+'88';
  c.addEventListener('click', ()=>{
    activeGroup = activeGroup===label ? null : label;
    document.querySelectorAll('.chip').forEach(el=>{
      el.classList.toggle('active',  el.textContent===activeGroup);
      el.classList.toggle('faded',   !!activeGroup && el.textContent!==activeGroup);
    });
    hover=null; draw();
  });
  panel.appendChild(c);
});

// Stats
document.getElementById('nc-dir').textContent = nodes.filter(n=>!n._isDOP).length.toLocaleString();
document.getElementById('nc-dop').textContent = nodes.filter(n=>n._isDOP).length.toLocaleString();
document.getElementById('mc').textContent = groupColorMap.size.toLocaleString();

// Cluster centroids + spreads
const regions = {};
for(const n of nodes){
  const g=n._group;
  if(!regions[g]) regions[g]={sumX:0,sumY:0,count:0,spread:0,color:n._c};
  regions[g].sumX+=n.x; regions[g].sumY+=n.y; regions[g].count++;
}
for(const r of Object.values(regions)){ r.cx=r.sumX/r.count; r.cy=r.sumY/r.count; }
for(const n of nodes){
  const r=regions[n._group];
  r.spread+=(n.x-r.cx)**2+(n.y-r.cy)**2;
}
for(const r of Object.values(regions)) r.spread=Math.sqrt(r.spread/r.count);

// Voronoi territory canvas
function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
const regionEntries = Object.entries(regions);
const VRES = 200;
const voronoiCv = document.createElement('canvas');
voronoiCv.width = VRES; voronoiCv.height = VRES;
if(regionEntries.length){
  const vCtx = voronoiCv.getContext('2d');
  const img  = vCtx.createImageData(VRES, VRES);
  for(let py=0;py<VRES;py++){
    for(let px=0;px<VRES;px++){
      const dx=px/VRES, dy=1-py/VRES;
      let bd=Infinity, bi=0;
      for(let i=0;i<regionEntries.length;i++){
        const r=regionEntries[i][1];
        const d=(dx-r.cx)**2+(dy-r.cy)**2;
        if(d<bd){bd=d;bi=i;}
      }
      const [rv,gv,bv]=hex2rgb(regionEntries[bi][1].color);
      const idx=(py*VRES+px)*4;
      img.data[idx]=rv; img.data[idx+1]=gv; img.data[idx+2]=bv; img.data[idx+3]=255;
    }
  }
  vCtx.putImageData(img,0,0);
}

// View
let view={x:0,y:0,s:0};
function fit(){
  const pad=90;
  view.s=Math.min(W-pad*2, H-pad*2);
  view.x=(W-view.s)/2; view.y=(H-view.s)/2;
}
fit();
function sx(n){return view.x+n.x*view.s}
function sy(n){return view.y+(1-n.y)*view.s}

let hover=null;

function drawBlobs(){
  const fade=Math.max(0,Math.min(1,(2200-view.s)/1200));
  if(!regionEntries.length||fade<=0) return;
  ctx.save();
  ctx.filter=`blur(${Math.max(32,view.s*0.04)}px)`;
  ctx.globalAlpha=fade*0.45;
  ctx.drawImage(voronoiCv, view.x, view.y, view.s, view.s);
  ctx.filter='none';
  ctx.restore();
}

function drawLabels(){
  const fade=Math.max(0,Math.min(1,(2000-view.s)/1000));
  if(!regionEntries.length||fade<=0) return;
  ctx.save();
  ctx.globalAlpha=fade;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='700 15px "Helvetica Neue",Arial,sans-serif';
  const hpad=8, barW=4;
  for(const [label,r] of regionEntries){
    const scx=view.x+r.cx*view.s, scy=view.y+(1-r.cy)*view.s;
    const tw=ctx.measureText(label.toUpperCase()).width;
    const bw=tw+hpad*2+barW, bh=22, bx=scx-bw/2, by=scy-bh/2;
    ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8;
    ctx.fillStyle='rgba(8,8,12,0.88)';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(bx,by,bw,bh,4); else ctx.rect(bx,by,bw,bh);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=r.color; ctx.fillRect(bx,by,barW,bh);
    ctx.fillStyle='#f0ede4';
    ctx.fillText(label.toUpperCase(), scx+barW/2, scy+1);
  }
  ctx.restore();
}

function isVisible(n){ return roleVisible[n.role??'Director'] && (!activeGroup||n._group===activeGroup); }

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBlobs();

  const base = Math.max(2, view.s*0.0032);

  // Hover edges — draw before nodes so they sit underneath
  if(hover && isVisible(hover)){
    const hx=sx(hover), hy=sy(hover);
    ctx.save();
    ctx.strokeStyle='rgba(216,178,94,0.35)';
    ctx.lineWidth=0.9;
    ctx.beginPath();
    for(const nb of hover._nbrs){
      if(!isVisible(nb)) continue;
      ctx.moveTo(hx, hy);
      ctx.lineTo(sx(nb), sy(nb));
    }
    ctx.stroke();
    // Highlight neighbour nodes
    for(const nb of hover._nbrs){
      if(!isVisible(nb)) continue;
      ctx.fillStyle=nb._c;
      ctx.globalAlpha=0.85;
      ctx.beginPath();
      ctx.arc(sx(nb),sy(nb), base*nb._rscale*1.4, 0, 6.2832);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // All nodes
  for(const n of nodes){
    if(!roleVisible[n.role??'Director']) continue;
    const groupOk = !activeGroup || n._group===activeGroup;
    const isNbr   = hover && hover._nbrs.includes(n);
    const dimmed  = !groupOk || (hover && hover!==n && !isNbr);
    ctx.globalAlpha = dimmed ? 0.08 : 1;
    const r = hover===n ? base*3 : base*n._rscale;

    if(n._isDOP){
      ctx.strokeStyle=n._c;
      ctx.lineWidth=Math.max(1, r*0.45);
      ctx.beginPath(); ctx.arc(sx(n),sy(n), r*0.85, 0, 6.2832); ctx.stroke();
    } else {
      ctx.fillStyle=n._c;
      ctx.beginPath(); ctx.arc(sx(n),sy(n), r, 0, 6.2832); ctx.fill();
    }
  }
  ctx.globalAlpha=1;

  // Hover ring
  if(hover && isVisible(hover)){
    ctx.strokeStyle='rgba(232,230,223,.9)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(sx(hover),sy(hover),Math.max(5,base*3.2),0,6.2832); ctx.stroke();
  }

  drawLabels();
}
draw();

// Tooltip
function showTip(n, px, py){
  const roleLabel = n._isDOP ? '○ Cinematographer' : '● Director';
  const nearNames = n._nbrs
    .filter(m => isVisible(m))
    .slice(0,4)
    .map(m=>`<span style="color:${m._c}">${m.name}</span>`)
    .join(', ');
  const parts=[
    `<strong style="color:#e8b14c">${n.name}</strong>`,
    `<span style="color:#5a5870;font-size:11px">${roleLabel}</span>`,
    `${n.film_count} film${n.film_count!==1?'s':''}`,
    nearNames ? `<span style="color:#46445a;font-size:11px">nearest: ${nearNames}</span>` : '',
    (n.cluster_label)?`<span style="color:${n._c};font-size:11px">${n.cluster_label}</span>`:'',
  ].filter(Boolean).join('<br>');
  tip.innerHTML=parts;
  tip.style.display='block';
  const tw=230;
  tip.style.left=Math.min(px+16, W-tw-8)+'px';
  tip.style.top=Math.max(8, py-10)+'px';
}
function hideTip(){ tip.style.display='none'; }

function hitTest(mx, my){
  const base=Math.max(2,view.s*0.0032);
  const thresh=Math.max(14,base*4);
  let best=null, bestD=Infinity;
  for(const n of nodes){
    if(!isVisible(n)) continue;
    const dx=sx(n)-mx, dy=sy(n)-my, d=dx*dx+dy*dy;
    if(d<thresh*thresh&&d<bestD){bestD=d;best=n;}
  }
  return best;
}

// Interaction — click does not navigate
let drag=false, last=null, moved=false;
stage.addEventListener('mousedown', e=>{drag=true;moved=false;last=[e.clientX,e.clientY];stage.classList.add('drag')});
window.addEventListener('mouseup', ()=>{
  drag=false; stage.classList.remove('drag');
});
window.addEventListener('mousemove', e=>{
  if(drag){
    const dx=e.clientX-last[0], dy=e.clientY-last[1];
    if(Math.abs(dx)+Math.abs(dy)>2) moved=true;
    view.x+=dx; view.y+=dy; last=[e.clientX,e.clientY]; draw(); hideTip(); return;
  }
  const n=hitTest(e.clientX,e.clientY);
  if(n!==hover){ hover=n; draw(); }
  if(n){ showTip(n,e.clientX,e.clientY); stage.classList.add('hovering'); }
  else  { hideTip(); stage.classList.remove('hovering'); }
});

// Zoom
stage.addEventListener('wheel', e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.88:1/0.88;
  view.x=e.clientX-(e.clientX-view.x)*f;
  view.y=e.clientY-(e.clientY-view.y)*f;
  view.s*=f; hover=null; hideTip(); draw();
},{passive:false});

function zoomBtn(f){
  const mx=W/2, my=H/2;
  view.x=mx-(mx-view.x)*f; view.y=my-(my-view.y)*f; view.s*=f;
  hover=null; hideTip(); draw();
}
document.getElementById('zin').onclick   = ()=>zoomBtn(1.25);
document.getElementById('zout').onclick  = ()=>zoomBtn(1/1.25);
document.getElementById('reset').onclick = ()=>{ fit(); hover=null; hideTip(); draw(); };
</script>
</body>
</html>
